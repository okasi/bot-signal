name: Publish npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit coverage
        run: npm run test:coverage

      - name: Install Patchright Chromium
        run: npx patchright install chromium

      - name: Patchright browser tests
        run: npm run test:patchright

      - name: Build
        run: npm run build

      - name: Package lint
        run: npm run lint:package

      # Trusted Publishing (OIDC) — no NPM_TOKEN. Configure on npmjs.com first.
      - name: Publish to npm
        run: npm publish --provenance --access public
