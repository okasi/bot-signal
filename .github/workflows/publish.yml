name: Publish npm

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: npm-release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Prepare automatic patch release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm version patch --no-git-tag-version
          PKG_VERSION=$(node -p "require('./package.json').version")
          node -e "const fs = require('node:fs'); const path = 'src/version.ts'; const source = fs.readFileSync(path, 'utf8'); fs.writeFileSync(path, source.replace(/export const VERSION = \"[^\"]+\";/, 'export const VERSION = \"' + process.argv[1] + '\";'))" "$PKG_VERSION"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm 11.5.1 or newer. Do not rely on the
      # npm version bundled with the selected Node.js release.
      - name: Install npm with OIDC support
        run: npm install --global npm@latest

      - name: Show publishing tool versions
        run: |
          node --version
          npm --version

      - name: Check whether version is already published
        id: publish_status
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "bot-signal@$PKG_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "### bot-signal@$PKG_VERSION is already published; nothing to do." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.publish_status.outputs.should_publish == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.publish_status.outputs.should_publish == 'true'
        run: npm run typecheck

      - name: Unit coverage
        if: steps.publish_status.outputs.should_publish == 'true'
        run: npm run test:coverage

      - name: Install Patchright Chromium
        if: steps.publish_status.outputs.should_publish == 'true'
        run: npx patchright install chromium

      - name: Patchright browser tests
        if: steps.publish_status.outputs.should_publish == 'true'
        run: npm run test:patchright

      - name: Build
        if: steps.publish_status.outputs.should_publish == 'true'
        run: npm run build

      - name: Package lint
        if: steps.publish_status.outputs.should_publish == 'true'
        run: npm run lint:package

      - name: Commit and tag automatic release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.publish_status.outputs.should_publish == 'true'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/version.ts
          git commit -m "Release bot-signal $PKG_VERSION [skip release]"
          git tag -a "v$PKG_VERSION" -m "bot-signal v$PKG_VERSION"
          git push origin HEAD:main "v$PKG_VERSION"

      # Trusted Publishing (OIDC) — no NPM_TOKEN. npm automatically creates
      # provenance for public packages published from GitHub Actions.
      - name: Publish to npm
        if: steps.publish_status.outputs.should_publish == 'true'
        run: npm publish --access public --registry=https://registry.npmjs.org
